services:
  db:
    image: docker.io/library/postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clash
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: clash_configurator
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../drizzle:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U clash -d clash_configurator']
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    image: localhost/clash-chain-configurator:prod
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      DATABASE_URL: postgres://clash:${POSTGRES_PASSWORD}@db:5432/clash_configurator
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: docker.io/library/caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
